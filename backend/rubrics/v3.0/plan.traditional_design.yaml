# plan.traditional_design.yaml
# System design interview where the artifact IS the plan. No build phase.
# AI usage is NOT a concern of this rubric — this is for traditional
# whiteboard-style design questions.

schema_version: 2
rubric_version: v3.0
phase: plan
kind: traditional_design
phase_name: "Plan & Scope (Traditional Design)"
extends: plan.shared.yaml

goal: |
  Convert the open-ended interview prompt into a written, scoped design
  for a production-scale system: in/out, target NFRs, architectural
  shape with seams, data model with scale-aware reasoning, capacity
  estimates, named bottlenecks with mitigations. The candidate is
  *designing*, not building — articulation depth and reasoning quality
  matter more than build mechanics.

time_bounds:
  target_min_minutes: 25
  target_max_minutes: 45
  flag_under_minutes: 15
  flag_over_minutes: 60

# Promote shared signals that matter more in design mode.
override_signals:
  explicit_tradeoffs:
    weight: high
  clarification_evidence:
    weight: high

add_signals:
  # ---------- Design-mode GOOD signals ----------

  - id: shape_and_seams
    polarity: good
    weight: high
    paired_with: shape_without_seams
    description: |
      Plan commits to a specific architectural shape AND names 2-3
      seams where future scale would be added without rewriting.
      Each seam ties to a target-scale concern stated in NFRs.
    judge_notes: |
      A seam is a boundary designed for future swap or extension.
      "Layered monolith with repo interface for DB swap, sync->async
      seam at the analytics writer, sharded counter behind a counter
      service" passes. "Layered monolith" alone fails.
    evidence_hint: "Quote the shape sentence and each named seam (with the NFR it ties to)."

  - id: dual_scale_nfrs
    polarity: good
    weight: high
    paired_with: scale_pretense
    description: |
      Plan distinguishes demo-scale (what the design is sketched
      against) from target-scale (what the architecture must grow
      into without rewrite), with numeric targets for both.
    judge_notes: |
      "Demo: 100 RPS for the load test sketch; Target: 10K RPS
      sustained, 50K peak" passes. A single scale claim fails.
    evidence_hint: "Quote the NFR section."

  - id: capacity_estimation
    polarity: good
    weight: high
    weight_by_seniority:
      junior: low
      mid:    medium
      senior: high
      staff:  high
    description: |
      Plan includes back-of-envelope capacity numbers — storage,
      bandwidth, QPS — derived from stated target scale.
    judge_notes: |
      "200M URLs × 300 B avg = ~60 GB hot storage; 10K req/s × 1 KB
      avg = ~10 MB/s ingress at peak" passes. "We'll need a lot of
      storage" fails. Numbers don't have to be precisely right; they
      have to be derived from stated inputs and defensible.
    evidence_hint: "Quote the capacity numbers and the derivation."

  - id: bottleneck_identification
    polarity: good
    weight: high
    weight_by_seniority:
      junior: low
      mid:    medium
      senior: high
      staff:  high
    description: |
      Plan names the system's primary bottleneck under target load
      and proposes a specific mitigation. Bottleneck is concrete (a
      component / read-path / write-path), not abstract.
    judge_notes: |
      "Hot-row analytics counter: mitigate with async queue + periodic
      aggregation, not direct row updates" passes. "Database might be
      slow" fails.
    evidence_hint: "Quote the bottleneck + the mitigation."

  - id: read_write_path_differentiation
    polarity: good
    weight: medium
    description: |
      Plan distinguishes the read path from the write path with
      different design choices (caching, replication, indexing,
      consistency).
    judge_notes: |
      For systems with skewed read:write ratios this is essential. A
      URL shortener with 20:1 read:write should treat the resolve
      path and create path differently. Symmetric treatment is a miss
      when the ratio is asymmetric.
      cannot_evaluate when read:write is roughly symmetric and the
      question prompt makes this clear.
    evidence_hint: "Quote the section that differentiates read from write."

  - id: caching_strategy_articulated
    polarity: good
    weight: medium
    description: |
      If caching is in scope, plan names the cache layer, what's
      cached, the eviction strategy, and what happens on cache miss.
    judge_notes: |
      "Redis read-through cache for short_code -> long_url; LRU
      eviction; singleflight on miss" passes. "Add a cache" fails.
      cannot_evaluate if caching is genuinely out of scope.
    evidence_hint: "Quote the cache section."

  - id: consistency_model_chosen
    polarity: good
    weight: medium
    weight_by_seniority:
      junior: low
      mid:    low
      senior: medium
      staff:  high
    description: |
      Plan names the consistency model for at least one component
      where it matters, and ties that choice to a stated requirement.
    judge_notes: |
      "Click counts are eventually consistent (trade strict accuracy
      for write throughput)" passes. "Strong consistency everywhere"
      without justification fails the reasoning bar.
    evidence_hint: "Quote the consistency choice + the justification."

  # ---------- Design-mode BAD signals ----------

  - id: shape_without_seams
    polarity: bad
    weight: medium
    paired_with: shape_and_seams
    description: |
      Architectural shape is committed but seams are absent or generic.
    judge_notes: |
      Seams are the architectural maturity signal — their absence is a
      real gap in design mode.
    evidence_hint: "Quote the shape sentence and note absent or generic seams."

  - id: scale_pretense
    polarity: bad
    weight: medium
    paired_with: dual_scale_nfrs
    description: |
      Plan claims production-grade scale will be built (not just
      designed for) within the design exercise.
    judge_notes: |
      Statements like "system will handle 100k RPS" without
      distinguishing architected-for vs built-for fires this.
    evidence_hint: "Quote the scale claim that conflates demo and production."

# Add design-mode-specific required sections.
override_pass_bar:
  add_sections:
    - id: architectural_shape_and_seams
      name: "Architectural shape and seams"
      must_contain:
        - "One-sentence description of the system's overall structure"
        - "2-3 named seams where future scale would be added without rewriting, each tied to a target-scale concern"
    - id: capacity_estimation_section
      name: "Capacity estimation"
      must_contain:
        - "Back-of-envelope numbers for storage, bandwidth, and request throughput at target scale"
    - id: bottlenecks_and_mitigations
      name: "Bottlenecks and mitigations"
      must_contain:
        - "At least one named bottleneck and a concrete mitigation"

scoring:
  anchors:
    5: |
      Pass bar fully met. Plan demonstrates real scale-aware
      reasoning: named seams tied to NFRs, capacity numbers derived
      from target scale, primary bottleneck named with concrete
      mitigation. No bad signals fire.
    4: |
      Pass bar met. Most good signals hit including all high-weight
      ones. Minor gaps in medium-weight signals. No high-severity
      bad signals.
    3: |
      Pass bar met but one or more high-weight good signals are
      partial or missed. Some medium bad signals fire. Design is
      workable but reasoning is shallow.
    2: |
      Pass bar partially missed, OR multiple high-weight good
      signals missed.
    1: |
      No plan.md, OR plan exists but is functionally empty, OR plan
      shows no scale-aware reasoning whatsoever.
  calibration_note: |
    Design mode's central question is: did the plan demonstrate
    scale-aware reasoning? A plan that lists what to build but never
    names a bottleneck or estimates capacity is not a design exercise
    — it's a wishlist. Apply this lens when judging high-weight
    signals: capacity_estimation, bottleneck_identification,
    shape_and_seams, dual_scale_nfrs.