schema_version: 2
phase: plan

weight_values:
  high: 3
  medium: 2
  low: 1

pass_bar:
  description: |
    A plan.md file exists at the project root, committed before any
    implementation file. It contains all required sections below, each
    non-empty.
  required_artifact: "plan.md at project root"
  temporal_check: "Committed before the first implementation file"
  required_sections:
    - id: scope
      name: "Scope"
      must_contain:
        - "Explicit list of in-scope features"
        - "Explicit list of out-of-scope features"
    - id: functional_requirements
      name: "Functional requirements"
      must_contain:
        - "List of what the system must do"
    - id: non_functional_requirements
      name: "Non-functional requirements"
      must_contain:
        - "Numeric targets the build will be validated against (demo or production scale, per mode)"
    - id: tool_choices
      name: "Tool choices"
      must_contain:
        - "Chosen stack/libraries"
        - "One-line reasoning per choice, referencing at least one stated requirement"
    - id: data_model
      name: "Data model"
      must_contain:
        - "Entities with key fields"
        - "Relationships between entities, if any"
    - id: component_boundaries
      name: "Component boundaries"
      must_contain:
        - "Named modules with one-line responsibility per module"
        - "Statement of which modules can call which (the dependency direction)"
    - id: key_interfaces
      name: "Key interfaces"
      must_contain:
        - "Function or method sketches for the main cross-module boundaries"
    - id: failure_modes
      name: "Failure modes"
      must_contain:
        - "List of failure modes the build will handle"
        - "List of failure modes explicitly punted out of scope"
    # - id: ai_usage_plan
    #   name: "AI usage plan"
    #   must_contain:
    #     - "What will be delegated to AI"
    #     - "What the candidate will write themselves"

signals:
  # ---------- Shared GOOD signals ----------

  - id: scope_specificity
    polarity: good
    weight: high
    description: |
      Scope names 2-4 specific, buildable features. Features are concrete
      (named endpoints, operations, or user-facing behaviors), not
      abstract.
    judge_notes: |
      Each feature must be concrete enough to write a one-line acceptance
      test for. Vague names fail this signal even if count is right.
    evidence_hint: "Quote the in-scope features list verbatim."

  - id: scope_realism
    polarity: good
    weight: high
    description: |
      Total scope is plausibly buildable in the time remaining after
      planning. The variant decides whether "buildable" means an actual
      build (build mode) or articulation depth (design mode).
    judge_notes: |
      Apply "defensible, not optimal." Ambitious-but-not-absurd is fine.
    evidence_hint: "Quote the in-scope list and reference the scope budget assumed."

  - id: scope_cuts
    polarity: good
    weight: medium
    paired_with: missing_or_trivial_cuts
    description: |
      Plan explicitly lists 2+ out-of-scope items. Cuts are non-trivial.
    judge_notes: |
      "Out of scope: nothing" or absurd cuts fail. Cuts should be real
      tradeoffs.
    evidence_hint: "Quote the out-of-scope list verbatim."

  - id: clarification_evidence
    polarity: good
    weight: medium
    description: |
      Plan shows evidence the candidate considered key clarifying
      dimensions before committing to scope. Dimensions include data
      shape, latency, scale, retention, and (for AI systems) context
      window / memory.
    judge_notes: |
      Look for explicit "assumed:" / "given:" entries or an assumptions
      section. The signal is about visibility of thought, not correctness
      of assumptions. Plan should address 2-3 dimensions relevant to the
      prompt; irrelevant dimensions don't count.
    evidence_hint: "Quote 'assumed:' / 'given:' entries or the assumptions section."

  - id: tool_reasoning
    polarity: good
    weight: medium
    description: |
      Each tool choice is paired with a one-line reason that references a
      stated requirement.
    judge_notes: |
      Apply "defensible, not optimal" — the signal is about reasoning
      quality, not choice optimality.
    evidence_hint: "Quote 1-2 tool-choice + reasoning lines."

  - id: tool_stack_completeness
    polarity: good
    weight: high
    description: |
      Tool choices cover every component named in the architecture, data
      model, and component boundaries sections. No component is left
      without a corresponding tool, library, or explicit decision to mock
      or defer it.
    judge_notes: |
      Cross-reference the tools section against the rest of plan.md.
    evidence_hint: "Note any component that lacks a tool / mock / defer note."

  - id: explicit_tradeoffs
    polarity: good
    weight: medium
    paired_with: tradeoffs_as_platitudes
    description: |
      Plan names 2-3 explicit trade-offs accepted, with reasoning that
      ties each to a stated requirement or constraint.
    judge_notes: |
      A trade-off has two sides and a reasoned choice between them.
      Examples (different domains): "chose eventual consistency over
      strong consistency because read latency is the bottleneck" for a
      counter API; "chose pull over push because clients are mobile and
      battery-sensitive" for a notifications system.
    evidence_hint: "Quote the trade-offs section."

  - id: data_model_committed
    polarity: good
    weight: high
    paired_with: data_model_only_in_code
    description: |
      Plan commits to entities, their key fields, and relationships
      before any schema or model file is written. Data model decisions
      connect to architectural concerns where relevant.
    judge_notes: |
      Examples (different domains): "Url(id, slug, target, click_count)"
      for a URL shortener; "Counter(id, value, owner_id)" for a counter
      API; "ChatRoom(id, members[], created_at) + Message(id, room_id,
      body)" for a chat app. Full DDL is NOT required — entities + key
      fields + relationships is enough.
    evidence_hint: "Quote the entities + key fields."

  - id: component_boundaries
    polarity: good
    weight: medium
    description: |
      Plan names modules with one-line responsibilities and states the
      dependency direction (what calls what).
    judge_notes: |
      "handlers/ -> services/ -> repos/, no skipping" passes. "Modular
      architecture with separation of concerns" fails — too abstract.
    evidence_hint: "Quote the modules list and dependency-direction sentence."

  - id: interfaces_sketched
    polarity: good
    weight: medium
    description: |
      Key cross-module interfaces are sketched with function/method
      signatures or near-equivalents.
    judge_notes: |
      Examples (different domains): "UrlRepo.create(target) -> slug" for
      a URL shortener; "Bucket.tryConsume(tenantId, route, n)" for a
      rate limiter; "Ingest.put(event) -> AcknowledgedOffset" for a log
      pipeline. Full type signatures NOT required.
    evidence_hint: "Quote 1-2 interface sketches."

  - id: failure_modes_articulated
    polarity: good
    weight: medium
    paired_with: no_failure_mode_articulation
    description: |
      Plan names failure modes that will be handled and failure modes
      explicitly punted. Punted failure modes are real (not strawmen).
    judge_notes: |
      Examples (different domains): "Failures handled: invalid slug
      (404), DB unreachable (retry once then 500). Punted: partial DB
      writes" passes for a URL shortener. "Failures handled: queue
      back-pressure (drop-oldest), consumer crash (replay from last
      offset). Punted: cross-region replication" passes for a log
      pipeline. "Will handle errors gracefully" fails.
    evidence_hint: "Quote 2-3 handled failures and 2-3 punted ones."

  # ---------- Shared BAD signals ----------

  - id: code_before_plan
    polarity: bad
    weight: high
    critical: true
    cap_at_score: 2
    description: |
      Implementation files (handlers, models, schemas) appear in the
      git log before plan.md is committed. The plan didn't actually
      constrain anything.
    judge_notes: |
      Combined first commits with substantial implementation alongside
      plan.md are critical violations.
    evidence_hint: "Quote the offending commit SHA(s) and filenames."

  # - id: ai_authored_plan
  #   polarity: bad
  #   weight: high
  #   requires_evidence: [hints, snapshots]
  #   description: |
  #     plan.md appears AI-generated and adopted with minimal candidate
  #     editing, rather than candidate-authored and AI-refined.
  #   judge_notes: |
  #     EVIDENCE PRECONDITION: this signal requires hint-chat history AND
  #     snapshot timeline. If only plan.md is provided (no hint exchanges,
  #     no snapshot ordering), return cannot_evaluate with evidence
  #     "no timing or AI-interaction signal available — cannot
  #     responsibly judge AI authorship from plan.md alone".

  #     When evidence IS available, look for converging signatures:
  #     (a) hint history shows a single prompt eliciting a full
  #     architectural plan that closely matches plan.md;
  #     (b) snapshot timeline shows plan.md materializing in a single
  #     large jump shortly after a hint exchange;
  #     (c) plan.md is comprehensive-but-generic, abstract tradeoffs
  #     untied to specific constraints.
  #     Two or more signatures fires this signal.
  #   evidence_hint: "List the converging signatures with quotes/timestamps."

  - id: data_model_only_in_code
    polarity: bad
    weight: high
    paired_with: data_model_committed
    description: |
      Data model is never written down in plan.md and appears for the
      first time in models.py, schema.sql, or equivalent.
    judge_notes: |
      Check whether data model section in plan.md names entities and
      key fields before any storage implementation file exists in git.
    evidence_hint: "Note absence of data model in plan.md and quote the implementation file."

  - id: tool_stack_mismatch
    polarity: bad
    weight: high
    description: |
      Tool choices listed are insufficient to build the architecture
      described.
    judge_notes: |
      Examples: "LLM-powered search" with no LLM tools listed;
      "real-time notifications" with no queue or websocket tooling;
      "vector search" with only a relational DB. High weight because
      the plan and the tools are about different systems.
    evidence_hint: "Quote the architecture claim and the tools list; describe the gap."

  - id: missing_or_trivial_cuts
    polarity: bad
    weight: medium
    paired_with: scope_cuts
    description: |
      plan.md lacks an out-of-scope section, OR contains only trivial
      cuts (items nobody plausibly would have included).
    judge_notes: |
      Missing section is a pass-bar failure. Trivial cuts: judge
      whether a reasonable candidate might have included this if not
      being disciplined.
    evidence_hint: "Quote the out-of-scope section or note absence."

  - id: no_failure_mode_articulation
    polarity: bad
    weight: medium
    paired_with: failure_modes_articulated
    description: |
      Failure modes section is absent, empty, or filled with generic
      platitudes ("handle errors gracefully") rather than specific
      failures.
    judge_notes: |
      Examples (different domains): for a URL shortener, "404 on bad
      slug, retry on DB unreachable" passes; for a log pipeline,
      "drop-oldest on consumer lag" passes. Generic claims fail.
    evidence_hint: "Quote the failure-modes section verbatim, or note absence."

  - id: tradeoffs_as_platitudes
    polarity: bad
    weight: low
    paired_with: explicit_tradeoffs
    description: |
      Plan mentions trade-offs but uses generic, content-free language
      ("considered the tradeoffs", "balanced the concerns") without
      naming what was traded for what.
    judge_notes: |
      Lower weight because it's a quality issue, not a structural one.
      The candidate is gesturing at the concept without engaging.
    evidence_hint: "Quote the platitude phrasing."

  - id: boundaries_without_interfaces
    polarity: bad
    weight: medium
    description: |
      Component boundaries are named but no interfaces are sketched
      between them. Modules exist as labels without contracts.
    judge_notes: |
      Without interface sketches, an AI build will fill in arbitrary
      contracts.
    evidence_hint: "Quote the modules list and note absent interface sketches."

# ai_usage_for_this_phase:
#   description: |
#     Plan must be candidate-authored first, then refined with AI — not
#     AI-generated and adopted.
#   good_modes:
#     - "Mode 1 — Autocomplete: candidate has decisions, AI helps express them cleanly"
#     - "Mode 2 — Sparring partner: candidate has draft, AI challenges or surfaces blind spots"
#   bad_modes:
#     - "Mode 3 — Outsourcing: AI generates plan from prompt, candidate adopts with minimal edits"
